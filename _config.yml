# =============================================================================
# CONFIGURAÇÃO DO SITE
# =============================================================================
# Este arquivo controla a aparência e comportamento geral do site.
# Para replicar pra outra especialidade (ex: oftalmologia), altere os campos
# marcados com [REPLICAR] e mude o nome do repositório no GitHub.

# Tema (não alterar)
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"

# =============================================================================
# IDENTIDADE DO SITE [REPLICAR]
# =============================================================================
title: "Editorial Diário de Nutrologia"
subtitle: "Briefing diário e aprendizado contínuo"
description: >-
  Atualizações diárias e aulas em nutrologia, geradas com apoio de inteligência
  artificial e revisadas para fins educativos.
url: "https://giuliano-dobri.github.io"
baseurl: "/nutrologia-diaria"
repository: "giuliano-dobri/nutrologia-diaria"

# Idioma e localização
locale: "pt-BR"
timezone: "America/Sao_Paulo"


# =============================================================================
# CONFIGURAÇÕES DE BUILD (não alterar a menos que saiba o que faz)
# =============================================================================
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: /pagina/:num/
timezone: America/Sao_Paulo

# Plugins habilitados (funciona via remote_theme)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Arquivos excluídos do build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md

# Inclui arquivos extras no build
include:
  - _pages

# =============================================================================
# DEFAULTS — REGRAS APLICADAS AUTOMATICAMENTE
# =============================================================================
defaults:
  # Posts (aulas) — layout padrão e configurações
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: false
      related: true
      comments: false
      show_date: true
      toc: true
      toc_sticky: true
      toc_label: "Conteúdo"

  # Páginas (sobre, etc) — layout padrão
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# =============================================================================
# FOOTER
# =============================================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/giuliano-dobri/nutrologia-diaria"
