name: Auto-merge PRs com label "auto-merge"

# Dispara quando um PR é aberto, atualizado, ou ganha uma label
on:
  pull_request:
    types: [opened, labeled, synchronize, reopened]

# Permissões necessárias para o workflow mergear o PR
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    # Só roda se o PR tem a label "auto-merge"
    if: contains(github.event.pull_request.labels.*.name, 'auto-merge')

    steps:
      - name: Esperar 30 segundos para garantir que checks iniciaram
        run: sleep 30

      - name: Auto-merge do PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Mergeando PR #$PR_NUMBER no repo $REPO"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --merge \
            --delete-branch \
            --admin
