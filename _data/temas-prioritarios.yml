# =============================================================================
# TEMAS PRIORITÁRIOS — EDITORIAL DIÁRIO DE NUTROLOGIA
# =============================================================================
#
# COMO USAR:
# - A routine consulta este arquivo todo dia antes de escolher o tema.
# - Pega o PRIMEIRO tema não-comentado da lista que ainda não foi coberto nos
#   últimos 60 dias (consulta _data/temas-cobertos.yml).
# - Após usar um tema, a routine COMENTA a linha (adiciona "# USADO em DD/MM/AAAA").
# - Para "pular" um tema temporariamente: comente a linha manualmente (adicione #).
# - Para reordenar prioridades: mova a linha para cima.
# - Para adicionar tema novo: insira nova entrada onde quiser na lista.
#
# FORMATO:
# - tema: "Nome do tema"
#   prioridade: alta | media | baixa  (opcional, default: media)
#   notas: "Observações"  (opcional)
#
# =============================================================================
# CURRICULUM — temas organizados aproximadamente na ordem de um curso de
# nutrologia. A routine vai descendo pela lista. Você pode reordenar livremente.
# =============================================================================

